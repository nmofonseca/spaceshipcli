# GitVersion configuration for semantic versioning (v6+ compatible)
workflow: TrunkBased/preview1
next-version: 0.1.0
assembly-versioning-scheme: MajorMinorPatch
major-version-bump-message: "^(break|breaking|major)(\\(.*\\))?:|BREAKING CHANGE:"
minor-version-bump-message: "^(feat|feature)(\\(.*\\))?:"
patch-version-bump-message: "^(fix|patch)(\\(.*\\))?:"

strategies:
  - ConfiguredNextVersion
  - TaggedCommit
  - Mainline
  - MergeMessage
  - Fallback

branches:
  main:
    regex: ^master$|^main$
    deployment-mode: ContinuousDeployment
    label: ''
    increment: Patch
    is-main-branch: true
  develop:
    regex: ^dev(elop)?(ment)?$
    deployment-mode: ContinuousDelivery
    label: dev
    increment: Minor
    is-main-branch: false
  pull-request:
    regex: ^(pull|pull\-requests|pr)[/-]
    deployment-mode: ContinuousDelivery
    label: pr
    increment: Inherit
    label-number-pattern: '[/-](?<number>\d+)'
    is-main-branch: false
