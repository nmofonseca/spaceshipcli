---
name: Linting

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  build:
    name: Linting
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: Checkout Code
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        # v6.0.2
        with:
          # Full git history is needed to get a proper list of changed files
          fetch-depth: 0

      - name: Lint Code Base
        # Using slim image, pinned to v8.6.0
        uses: >-
          super-linter/super-linter/slim@9e863354e3ff62e0727d37183162c4a88873df41
        # v8.6.0
        env:
          # Validate all files on push/manual run
          VALIDATE_ALL_CODEBASE: true
          # Dynamically set the default branch from the current ref
          DEFAULT_BRANCH: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Python Linters
          VALIDATE_PYTHON_BLACK: true
          VALIDATE_PYTHON_RUFF: true
          VALIDATE_PYTHON_PYLINT: true
          VALIDATE_PYTHON_MYPY: true

          # Other applicable project files
          VALIDATE_DOCKERFILE_HADOLINT: true
          VALIDATE_MARKDOWN: true
          VALIDATE_YAML: true
          VALIDATE_JSON: true
