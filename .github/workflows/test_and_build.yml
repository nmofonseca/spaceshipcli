---
name: Test and Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        # v6.0.2

      - name: Setup uv
        uses: >-
          astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
        # v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies (and verify lockfile)
        run: uv sync --frozen

      - name: Run pytest
        run: uv run pytest
        env:
          SPACESHIP_API_KEY: "dummy_ci_key"
          SPACESHIP_API_SECRET: "dummy_ci_secret"

  versioning:
    name: Determine Version
    runs-on: ubuntu-24.04
    outputs:
      app_version: ${{ steps.gitversion.outputs.SemVer }}
    steps:
      - name: Checkout Code
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        # v6.0.2
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: >-
          gittools/actions/gitversion/setup@bc6623af8fc07d5a8903052dd46da33403eec8e8
        # v4.5.0
        with:
          versionSpec: '6.7.x'

      - name: Determine Version
        id: gitversion
        uses: >-
          gittools/actions/gitversion/execute@bc6623af8fc07d5a8903052dd46da33403eec8e8
        # v4.5.0

  build-binary:
    name: Build Standalone Binary (${{ matrix.platform }})
    needs: [test, versioning]
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: amd64
          - runner: ubuntu-24.04-arm
            platform: arm64
    runs-on: ${{ matrix.runner }}
    env:
      APP_VERSION: ${{ needs.versioning.outputs.app_version }}
    steps:
      - name: Checkout Code
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        # v6.0.2

      - name: Setup uv
        uses: >-
          astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
        # v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Update pyproject.toml version
        run: |
          sed -i -E "s/^version = \".*\"/version = \"${{ env.APP_VERSION }}\"/" pyproject.toml

      - name: Build binary
        run: >-
          uv run pyinstaller --onefile --name "spaceshipcli-v${{ env.APP_VERSION }}-linux-${{ matrix.platform }}" --clean
          src/spaceship_cli/main.py

      - name: Upload Artifact
        uses: >-
          actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        # v7.0.1
        with:
          name: spaceshipcli-v${{ env.APP_VERSION }}-linux-${{ matrix.platform }}
          path: dist/spaceshipcli-v${{ env.APP_VERSION }}-linux-${{ matrix.platform }}

  create-release:
    name: Create GitHub Release
    needs: [build-binary, versioning]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      APP_VERSION: ${{ needs.versioning.outputs.app_version }}
    steps:
      - name: Checkout Code
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        # v6.0.2

      - name: Update pyproject.toml version
        run: |
          sed -i -E "s/^version = \".*\"/version = \"${{ env.APP_VERSION }}\"/" pyproject.toml

      - name: Commit and Tag Release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: release v${{ env.APP_VERSION }} [skip ci]"
          git tag "v${{ env.APP_VERSION }}"
          git push origin main --tags

      - name: Download Artifacts
        uses: >-
          actions/download-artifact@cc2057357809939e00c1f388e276f028111c8467
        # v7.0.1
        with:
          path: artifacts
          pattern: spaceshipcli-v*
          merge-multiple: true

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "v${{ env.APP_VERSION }}"
          ./artifacts/spaceshipcli-v${{ env.APP_VERSION }}-linux-amd64
          ./artifacts/spaceshipcli-v${{ env.APP_VERSION }}-linux-arm64
          --title "Release v${{ env.APP_VERSION }}"
          --generate-notes

  build-docker:
    name: Build Docker Image (${{ matrix.platform }})
    needs: [test, versioning]
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: amd64
          - runner: ubuntu-24.04-arm
            platform: arm64
    runs-on: ${{ matrix.runner }}
    env:
      APP_VERSION: ${{ needs.versioning.outputs.app_version }}
    steps:
      - name: Checkout Code
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        # v6.0.2

      - name: Update pyproject.toml version
        run: |
          sed -i -E "s/^version = \".*\"/version = \"${{ env.APP_VERSION }}\"/" pyproject.toml

      - name: Set up Docker Buildx
        uses: >-
          docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
        # v4.0.0

      - name: Build Docker image
        uses: >-
          docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        # v7.1.0
        with:
          context: .
          push: false
          platforms: linux/${{ matrix.platform }}
          build-args: |
            VERSION=${{ env.APP_VERSION }}
          tags: |
            spaceshipcli:latest
            spaceshipcli:${{ env.APP_VERSION }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
